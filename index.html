<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-container"></div>
    <div class="form-container">
      <form>
        <div class="form-layout">
          <section class="input-panel">
            <!--normally form refreshes the page, so we will use it as btn -->
            <h1>BMI Calculator</h1>
            <h2>height (cms)</h2>
            <input type="text" class="input" id="height" />
            <h2>weight (KGs)</h2>
            <input type="text" class="input" id="weight" />
            <br />
            <!-- here type btn changes it to not refresh -->

            <button id="submit">submit</button>
          </section>

          <aside class="result-panel">
            <div id="results">
              <h3>BMI Weight Guide:</h3>
              <p>Under Weight = Less than 18.6</p>
              <p>Normal Range = 18.6 and 24.9</p>
              <p>Overweight = Greater than 24.9</p>
            </div>
            <div id="shame"></div>
          </aside>
        </div>
      </form>
    </div>
    <section class="about-container" id="about">
      <h2 class="about-title">About Us</h2>
      <div class="about-grid">
        <article class="about-card">
          <img
            class="about-avatar"
            src="./nishank.png"
            alt="Photo of Member One"
          />
          <div class="about-meta">
            <h3>Nishank</h3>
            <p>ID: 2511981170</p>
            <a
              class="about-link"
              href="https://www.linkedin.com/in/nishank404/"
              class="about-link"
              target="_blank"
              rel="noreferrer"
            >
              Linkedin Profile
            </a>
            <br>

                 <a
              class="about-link"
              href="https://github.com/Devnish0"
              class="about-link"
              target="_blank"
              rel="noreferrer"
            >
              Github Profile
            </a>
          </div>
        </article>
        <article class="about-card">
          <img
            class="about-avatar"
            src="./mohit.jpeg"
            alt="Photo of Member Two"
          />
          <div class="about-meta">
            <h3>Mohit Kumar</h3>
            <p>ID: 2511981155</p>
            <a
              class="about-link"
              href="https://www.linkedin.com/in/mohit-kumar-500051307/"
              target="_blank"
              rel="noreferrer"
            >
              LinkedIn Profile
            </a>
            <br>
             <a
              class="about-link"
              href="https://github.com/mohitify404"
              class="about-link"
              target="_blank"
              rel="noreferrer"
            >
              Github Profile
            </a>
          </div>
        </article>
      </div>
    </section>
    <button id="changeBackground"></button>
  </body>
  <script src="script.js"></script>
</html>
